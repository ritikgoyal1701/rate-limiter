services:
  app:
    build:
      context: .
      dockerfile: deployment/Dockerfile
    env_file:
      - .env
    environment:
      REDIS_ADDR: redis:6383
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 12
    restart: unless-stopped
